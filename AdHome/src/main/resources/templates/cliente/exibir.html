<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec=http://www.thymeleaf.org/extras/spring-security
    xmlns:shiro=http://www.pollix.at/thymeleaf/shiro>
<head th:replace="~{fragmentos :: head('Cadastro Cliente')}"></head>
<body>
<header th:replace="~{fragmentos :: header('Detalhes do Cliente: ' + ${cliente.clienteId})}"></header>
<main>
	<div class="conteiner mt-4">
		<div class="row">
			<div class="col-12">
				<b>Nome:</b><span th:text="${cliente.nome}"></span><br/>
				<b>Data Nascimento:</b><span th:text="${cliente.dataNasci}"></span><br/>
				<b>Sexo:</b><span th:text="${cliente.sexo}"></span><br/>
			</div>
		</div>
		<div class="row">
			<div class="col-12">
				<a th:href="@{/cliente/{clienteId}/editar(clienteId = ${cliente.clienteId})}">Editar</a> <a href="../cliente">Voltar</a>
			</div>
		</div>
	</div>
</main>
</body>
</html>
