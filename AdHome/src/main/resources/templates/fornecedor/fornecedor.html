<!DOCTYPE html SYSTEM "http://www.thymeleaf.org/dtd/xhtml1-strict-thymeleaf-4.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="http://www.thymeleaf.org"
	xmlns:sec=http://www.thymeleaf.org/extras/spring-security
	xmlns:shiro=http://www.pollix.at/thymeleaf/shiro>
<head th:replace="~{fragmentos :: head('Cadastro Fornecedor')}"></head>
<body>
	<header th:replace="~{fragmentos :: header('Cadastrar Fornecedor')}"></header>
	<div class="container">
		<div class="row">
			<form action="#" method="POST">
				<div class="mb-3">
					<label for="nome" class="form-label">Nome do Fornecedor</label> 
					<input class="form-control" type="text" th:field="*{fornecedorDto.nome}"
						   placeholder="Nome digite o nome do fornecedor" />
				</div>
				<div class="mb-3">
					<label class="form-label">Escolha o Tipo de Contato</label>
					 <select class="form-select" th:field="*{fornecedorDto.contatoEnum}">
						<option th:each="contato : ${listaFornecedor}" 
					        th:value="${contato}" th:text="${contato}">
						</option>
					</select>
				</div>
				<div class="mb-3">
					<label class="form-label">Telefone de Contato</label> 
					<input class="form-control" type="text" placeholder="Digite seu Telefone" />
				</div>
				<div class="mb-3">
					<label class="form-label">E-mail</label>
					 <input class="form-control" type="text" placeholder="Digite seu e-mail" />
				</div>
				<div class="mb-3">
					<label class="form-label">Escolha o tipo de Endereço</label> 
					<select class="form-select" th:field="*{fornecedorDto.enderecoEnum}">
						<option th:each="endereco : ${listaEndereco}" 
						        th:value="${endereco}" th:text="${endereco}">
						</option>
					</select>
					<div class="mb-3">
						<label for="uf" class="form-label">UF</label> 
						<select class="form-select" name="enderecoCliente">
							<option value="GO">GO</option>
						</select>
					</div>
					<div class="mb-3">
						<label class="form-label">Cidade</label>
						 <input class="form-control" type="text" placeholder="Digite sua Cidade" />
					</div>
					<div class="mb-3">
						<label class="form-label">Bairro</label> 
						<input class="form-control" type="text" placeholder="Digite seu Bairro" />
					</div>
					<div class="mb-3">
						<label class="form-label">CEP</label> <input class="form-control"
							type="text" placeholder="Digite seu CEP" />
					</div>
					<div class="mb-3">
						<label class="form-label">Logradouro</label> 
						<input class="form-control" type="text" placeholder="Digite rua, av..." />
					</div>
					<div class="mb-3">
						<label class="form-label">Complemento</label> 
						<input class="form-control" type="text" />
					</div>
					<div class="mb-3">
						<label class="form-label">Número</label>
						 <input class="form-control" type="text"
							placeholder="Informe número da residencia" />
					</div>
				</div>
				<button type="submit" class="btn btn-primary">Salvar</button>
				<a href="javascript:history.back()">Voltar</a>
			</form>
		</div>
	</div>
	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
		crossorigin="anonymous">
		
	</script>
</body>
</html>
